<div class="bg">
  <span class="icon-close" (click)="goToHome()">
    <ion-icon name="close"></ion-icon>
  </span>
  <div class="title">Members Management</div>
  <div class="container">
    <div class="side-by-side">
      <div class="add_member">
        <h1 style="color: white">Add Member</h1>
        <form>
          <div class="row">
            <label class="form-label" id="label">Last Name</label>
            <input
              [(ngModel)]="name"
              id="nom"
              name="nom"
              type="text"
              class="form_input"
              placeholder="Enter member last name"
              required
            />
          </div>
          <div class="row">
            <label class="form-label" id="label">First Name</label>
            <input
              [(ngModel)]="firstname"
              id="prenom"
              name="prenom"
              type="text"
              class="form_input"
              placeholder="Enter memeber first name"
              required
            />
          </div>

          <div class="row">
            <label class="form-label" id="label">Email</label>

            <input
              [(ngModel)]="email"
              name="email"
              type="email"
              class="form_input"
              placeholder="Enter member email"
              required
            />
          </div>
          <div class="row">
            <label class="form-label" id="label">Password</label>

            <input
              [(ngModel)]="password"
              name="password"
              type="password"
              class="form_input"
              placeholder="Enter member Password"
              required
            />
          </div>
        </form>
        <div class="btn_add_member">
          <button class="btn btn-primary" id="btn" (click)="saveMember()">
            Add Member
          </button>
        </div>
      </div>
      <div class="members_list">
        <h1 style="color: white">Members List :</h1>
        <table class="table table-dark">
          <thead>
            <tr>
              <th style="background-color: black">Name</th>
              <th style="background-color: black">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let member of members; let i = index">
              <ng-container *ngIf="member.name !== 'admin'">
                <td>{{ member.name }} {{ member.firstname }}</td>
                <td>
                  <button
                    class="btn btn-danger"
                    (click)="removeMember(member._id)"
                  >
                    Remove Member
                  </button>
                </td>
              </ng-container>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
