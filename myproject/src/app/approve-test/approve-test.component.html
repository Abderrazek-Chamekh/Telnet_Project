<div class="bg">
  <span class="icon-close" (click)="goToHome()"
    ><ion-icon name="close"></ion-icon
  ></span>

  <div class="title">Tests Review</div>

  <div class="container">
    <div class="row">
      <table class="table table-dark">
        <thead>
          <tr></tr>
          <tr>
            <th>Action</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Time Limit</th>
            <th>Supervisor</th>
            <th>%Accomplished</th>
            <th>Remarks</th>
          </tr>
        </thead>
        <tbody id="new_row">
          <tr *ngFor="let row of rows; let i = index">
            <div *ngIf="!row.Is_Validated; then thenBlock"></div>
            <ng-template #thenBlock>
              <td id="normal_input">
                {{ row.Action }}
              </td>
              <td id="other_input">{{ row.Status }}</td>
              <td id="other_input">{{ row.Priority }}</td>
              <td id="other_input">{{ row.Time_Limit }}</td>
              <td id="other_input">{{ row.Responsible }}</td>
              <td id="pourcentage">
                <div class="progress" style="height: 80px">
                  <div
                    class="progress-bar bg-success"
                    role="progressbar"
                    [style.width.%]="row.Accomplished"
                    aria-valuenow="25"
                    aria-valuemin="0"
                    aria-valuemax="100"
                  >
                    {{ row.Accomplished }}%
                  </div>
                </div>
              </td>
              <td id="normal_input">{{ row.Remarks }}</td>
              <td
                style="border: none; background: transparent"
                id="btn_approve"
              >
                <button
                  class="btn btn-success"
                  id="btn"
                  (click)="approveTest(i)"
                >
                  Approve
                </button>
              </td></ng-template
            >
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
